version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: eplenarius_db
    environment:
      POSTGRES_DB: eplenarius
      POSTGRES_USER: eplenarius
      POSTGRES_PASSWORD: eplenarius_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
